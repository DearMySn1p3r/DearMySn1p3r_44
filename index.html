<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reCAPTCHA Maker</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<style>
  :root{
    --theme:#f7a8c5;
    --theme-text:#ffffff;
    --ink:#212530;
    --soft:#6f7686;
    --faint:#aab0bd;
    --line:#eef0f4;
    --fill:#f5f6f9;
    --fill-hi:#eef1f7;
    --surface:#ffffff;
    --ring:rgba(247,168,197,.25);
    --tint:rgba(247,168,197,.16);
    --tint-strong:rgba(247,168,197,.26);
    --green:#1fa463;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo',sans-serif;
    color:var(--ink);
    background:radial-gradient(900px 480px at 50% -240px,#ffffff 0%,transparent 72%),linear-gradient(180deg,#fbf7fa 0%,#f0eef4 100%);
    background-attachment:fixed;padding:50px 22px 90px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em;
  }
  .wrap{max-width:940px;margin:0 auto}

  /* brand */
  .brand{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:40px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(140deg,var(--theme),color-mix(in srgb,var(--theme) 62%,#000 8%));
    display:grid;place-items:center;box-shadow:0 8px 18px var(--ring);transition:background .3s}
  .brand .logo svg{width:18px;height:18px;color:#fff}
  .brand .wm{font-size:22px;font-weight:500;letter-spacing:-.03em}
  .brand .wm b{font-weight:800;color:var(--ink)}
  .brand .wm span{color:var(--theme);font-weight:700;transition:color .3s}

  .layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:46px;align-items:start}
  @media(max-width:860px){.layout{grid-template-columns:1fr;gap:30px}.stage{order:-1}}

  /* panel */
  .panel{background:var(--surface);border-radius:26px;padding:14px 26px 26px;box-shadow:0 2px 4px rgba(30,40,70,.03),0 30px 60px -40px rgba(40,50,90,.45)}
  .group{padding:18px 0}
  .group+.group{border-top:1px solid var(--line)}
  .lbl{font-size:12px;font-weight:600;color:var(--soft);margin-bottom:13px;display:block}

  .swatches{display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:center}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--line);
    transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;flex:0 0 26px}
  .swatch:hover{transform:scale(1.16)}
  .swatch.on{box-shadow:0 0 0 2px var(--ink);transform:scale(1.16)}
  .colorpick{position:relative;width:26px;height:26px;border-radius:50%;overflow:hidden;cursor:pointer;background:var(--fill);
    border:1.5px solid var(--line);display:grid;place-items:center;color:var(--faint);font-size:13px;transition:.2s;flex:0 0 26px}
  .colorpick:hover{color:var(--soft);border-color:var(--faint)}
  .colorpick input{position:absolute;inset:-10px;width:200%;height:200%;opacity:0;cursor:pointer}

  .ipt{width:100%;padding:13px 16px;border:1.5px solid transparent;border-radius:13px;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--fill);transition:.18s;outline:none}
  .ipt::placeholder{color:var(--faint)}
  .ipt:focus{background:#fff;border-color:var(--theme);box-shadow:0 0 0 4px var(--ring)}

  .upmain{display:flex;align-items:center;gap:13px;border-radius:14px;padding:12px;background:var(--fill);cursor:pointer;transition:.18s}
  .upmain:hover{background:var(--fill-hi)}
  .upmain .av{width:44px;height:44px;border-radius:11px;flex:0 0 44px;background:#e6e9f0 center/cover no-repeat;display:grid;place-items:center;color:var(--faint);font-size:18px;overflow:hidden}
  .upmain .av img{width:100%;height:100%;object-fit:cover}
  .upmain .tx{font-size:12px;color:var(--soft);line-height:1.45}
  .upmain .tx b{display:block;color:var(--ink);font-weight:600;font-size:13.5px;margin-bottom:1px}

  .row{display:flex;gap:9px}
  .mini{flex:1;padding:11px;border:1.5px solid transparent;border-radius:12px;background:var(--fill);font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:6px}
  .mini:hover{background:#fff;border-color:var(--theme);color:var(--theme)}
  .mini svg{width:15px;height:15px}
  .hint{font-size:11.5px;color:var(--faint);margin-top:12px;line-height:1.6}
  .hint b{color:var(--soft);font-weight:600}

  .settings{background:var(--fill);border-radius:15px;padding:2px 15px}
  .switch{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:13px 0}
  .switch span:first-child{font-size:13.5px;font-weight:600;color:var(--ink)}
  .toggle{width:40px;height:24px;border-radius:20px;background:#d7dbe3;position:relative;transition:.3s cubic-bezier(.4,0,.2,1);flex:0 0 40px}
  .toggle::after{content:"";position:absolute;top:2.5px;left:2.5px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.3s cubic-bezier(.4,0,.2,1)}
  .switch.on .toggle{background:var(--theme)}
  .switch.on .toggle::after{left:18.5px}

  .seg{display:flex;background:var(--fill);border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;padding:9px;border:none;border-radius:9px;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--soft);cursor:pointer;transition:.18s}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(20,30,60,.1)}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;transition:.18s;color:var(--theme-text);background:var(--theme)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 24px var(--ring)}
  .btn:active{transform:translateY(0)}
  .btn.soft{background:var(--tint);color:color-mix(in srgb,var(--theme) 72%,#000 28%)}
  .btn.soft:hover{background:var(--tint-strong);box-shadow:0 10px 22px var(--ring)}
  .reset{display:block;margin:16px auto 2px;background:none;border:none;color:var(--faint);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.18s}
  .reset:hover{color:var(--soft)}

  /* stage */
  .stage{position:sticky;top:42px;display:flex;justify-content:center}
  .scaler{transform-origin:top center;transition:transform .25s ease,height .25s ease;will-change:transform}
  .cardwrap{position:relative;width:380px;animation:pop .55s cubic-bezier(.2,.7,.2,1) both}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}

  .card{width:380px;background:var(--surface);border-radius:6px;overflow:hidden;border:1px solid #e6e8ee;box-shadow:0 2px 8px rgba(20,30,60,.06),0 28px 54px -22px rgba(30,40,80,.26)}
  .head{background:var(--theme);color:var(--theme-text);padding:20px 22px;display:flex;gap:16px;align-items:center;justify-content:space-between;transition:background .3s ease}
  .head .htxt{min-width:0;flex:1;display:flex;flex-direction:column}
  .head .phrase{font-size:13px;font-weight:400;opacity:.95;margin-bottom:5px}
  .head .name{font-size:27px;font-weight:700;line-height:1.18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
  .head .note{font-size:12px;font-weight:400;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .head .avatar{width:78px;height:78px;border-radius:7px;flex:0 0 78px;overflow:hidden;position:relative;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.25);cursor:grab;touch-action:none}
  .head .avatar:active{cursor:grabbing}
  .head .avatar .aphoto{position:absolute;inset:0;background:center/cover no-repeat;will-change:transform}
  .head .avatar .ph{position:absolute;inset:0;display:grid;place-items:center;font-size:10.5px;opacity:.85;text-align:center;line-height:1.3;font-weight:500}
  .head .avatar.has .ph{display:none}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:#fff;padding:2px}
  .cell{position:relative;aspect-ratio:1/1;background:#eceef2;cursor:pointer;overflow:hidden;user-select:none;touch-action:none}
  .cell.filled{cursor:grab}.cell.filled:active{cursor:grabbing}
  .cell .photo{position:absolute;inset:0;background:center/cover no-repeat;will-change:transform}
  .cell .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#cfd4dc;font-size:23px;transition:color .2s}
  .cell:hover .ph{color:#aab0bc}
  .cell.filled .ph{display:none}
  .cell .frame{position:absolute;inset:0;border:2.5px solid var(--theme);border-radius:9px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1}
  .cell.filled.sel .frame{opacity:1}
  .cell .check{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:50%;background:var(--theme);display:grid;place-items:center;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.22);pointer-events:none;opacity:0;transform:scale(.5);transition:opacity .15s,transform .25s cubic-bezier(.34,1.56,.64,1);z-index:2}
  .cell .check svg{width:13px;height:13px}
  .cell.filled.sel .check{opacity:1;transform:scale(1)}
  .cell .tools{position:absolute;top:6px;right:6px;display:none;gap:4px;z-index:3}
  .cell.filled:hover .tools{display:flex}
  .cell .tools button{width:23px;height:23px;border-radius:6px;border:none;cursor:pointer;background:rgba(0,0,0,.6);color:#fff;display:grid;place-items:center;backdrop-filter:blur(4px);transition:background .2s}
  .cell .tools button svg{width:13px;height:13px}
  .cell .tools button:hover{background:rgba(0,0,0,.9)}

  .foot{display:none;align-items:center;justify-content:space-between;padding:13px 16px;border-top:1px solid #f0f1f4;background:#fff}
  .card.showfoot .foot{display:flex}
  .foot .ico{display:flex;gap:16px;color:#9aa0a6}
  .foot .ico svg{width:23px;height:23px;cursor:pointer;transition:color .2s}
  .foot .ico svg:hover{color:#3c4043}
  .foot .verify{background:var(--theme);color:var(--theme-text);border:none;border-radius:4px;padding:11px 26px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
  .foot .verify:hover{filter:brightness(.93)}

  .busy{position:absolute;inset:0;background:rgba(255,255,255,.86);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:15px;z-index:9;border-radius:8px}
  .busy.show{display:flex}
  .busy .spin{width:38px;height:38px;border:3px solid #eef0f4;border-top-color:var(--theme);border-radius:50%;animation:sp .8s linear infinite}
  .busy p{font-size:14px;font-weight:600;color:var(--ink)}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* offscreen robot widget (used only when rendering GIF) */
  #robotStage{position:absolute;left:-10000px;top:0}
  .robot{width:300px;background:#fff;border:1px solid #d9dce2;border-radius:5px;display:flex;align-items:center;gap:13px;padding:11px 14px;font-family:'Pretendard Variable',Pretendard,sans-serif}
  .robot .rbox{width:28px;height:28px;border:2px solid #c4c8cf;border-radius:3px;flex:0 0 28px;background:#fff}
  .robot .rlabel{font-size:15px;color:#3c4043;flex:1}
  .robot .rbrand{display:flex;flex-direction:column;align-items:center;color:#9aa0a6;line-height:1.05}
  .robot .rbrand svg{width:30px;height:30px}
  .robot .rname{font-size:10px;margin-top:2px}.robot .rterms{font-size:8px;margin-top:1px}

  .toast{position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(20px);background:#212530;color:#fff;padding:13px 26px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.3s cubic-bezier(.34,1.56,.64,1);z-index:50;box-shadow:0 12px 28px rgba(0,0,0,.18)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="wm"><b>reCAPTCHA</b> <span>Maker</span></span>
  </div>

  <div class="layout">
    <!-- CONTROLS -->
    <div class="panel">
      <div class="group">
        <span class="lbl">테마 색상</span>
        <div class="swatches" id="swatches">
          <span class="swatch" data-c="#f7a8c5" style="background:#f7a8c5"></span>
          <span class="swatch" data-c="#ec4899" style="background:#ec4899"></span>
          <span class="swatch" data-c="#ef4444" style="background:#ef4444"></span>
          <span class="swatch" data-c="#f59e0b" style="background:#f59e0b"></span>
          <span class="swatch" data-c="#34c759" style="background:#34c759"></span>
          <span class="swatch" data-c="#4285f4" style="background:#4285f4"></span>
          <span class="swatch" data-c="#a78bfa" style="background:#a78bfa"></span>
          <label class="colorpick" title="직접 선택">＋<input type="color" id="colorInput" value="#f7a8c5"></label>
        </div>
      </div>

      <div class="group">
        <span class="lbl">제시어 (키워드)</span>
        <input class="ipt" type="text" id="inName" value="캐릭터" placeholder="예: 토끼, 안경 쓴 사람…" maxlength="20">
      </div>

      <div class="group">
        <span class="lbl">대표 썸네일</span>
        <label class="upmain">
          <span class="av" id="avPrev"><span>＋</span></span>
          <span class="tx"><b>우측 상단 썸네일 업로드</b>넣은 뒤 드래그·휠로 위치 조정</span>
          <input type="file" accept="image/*" id="mainFile" hidden>
        </label>
      </div>

      <div class="group">
        <span class="lbl">그리드 이미지 (9칸)</span>
        <div class="row">
          <button class="mini" id="bulkBtn"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>한 번에 채우기</button>
          <button class="mini" id="allBtn"><svg viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>모두 선택</button>
        </div>
        <input type="file" accept="image/*" id="bulkFile" multiple hidden>
        <p class="hint">칸을 <b>클릭</b>=체크, <b>드래그</b>=이동, <b>휠/핀치</b>=확대·축소. 빈 칸 클릭은 업로드.</p>
      </div>

      <div class="group">
        <div class="settings">
          <label class="switch on" id="footSwitch"><span>하단 컨트롤 바</span><span class="toggle"></span></label>
        </div>
      </div>

      <div class="group">
        <span class="lbl">GIF 결과 (“로봇이 아닙니다”)</span>
        <div class="seg" id="resultSeg">
          <button class="on" data-r="success">성공 ✓</button>
          <button data-r="fail">실패 ✕</button>
        </div>
      </div>

      <div class="group">
        <div class="btns">
          <button class="btn" id="pngBtn">PNG 저장</button>
          <button class="btn soft" id="gifBtn">GIF 저장</button>
        </div>
        <button class="reset" id="resetBtn">초기화</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="stage" id="stage">
      <div class="scaler" id="scaler">
        <div class="cardwrap" id="cardwrap">
          <div class="card showfoot" id="card">
            <div class="head">
              <div class="htxt">
                <div class="phrase">다음이 포함된 이미지를 모두 선택하세요:</div>
                <div class="name" id="cardName">캐릭터</div>
                <div class="note">일치하는 이미지가 없으면 새로고침을 클릭하세요.</div>
              </div>
              <div class="avatar" id="cardAvatar"><div class="aphoto"></div><span class="ph">대표<br>이미지</span></div>
            </div>
            <div class="grid" id="grid"></div>
            <div class="foot">
              <div class="ico">
                <svg viewBox="0 0 24 24" fill="none"><path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.6 9a7 7 0 0 1 11.3-2.3L20 10M18.4 15a7 7 0 0 1-11.3 2.3L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <svg viewBox="0 0 24 24" fill="none"><path d="M4 14v-2a8 8 0 0 1 16 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="3" y="13" width="4" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="17" y="13" width="4" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
                <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.6" r="1.1" fill="currentColor"/></svg>
              </div>
              <button class="verify">확인</button>
            </div>
          </div>
          <div class="busy" id="busy"><div class="spin"></div><p id="busyTxt">만드는 중…</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="robotStage">
  <div class="robot" id="robotWidget">
    <div class="rbox" id="rbox2"></div>
    <span class="rlabel">로봇이 아닙니다</span>
    <div class="rbrand">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12a7 7 0 0 1 12-4.9l2.2 2.2" stroke="#1c69d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 12a7 7 0 0 1-12 4.9L4.8 14.7" stroke="#1c69d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19.5 4.2v5h-5M4.5 19.8v-5h5" stroke="#1c69d4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="rname">reCAPTCHA</span><span class="rterms">개인정보 보호 - 약관</span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const CHECK='<svg viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const SWAP='<svg viewBox="0 0 24 24" fill="none"><path d="M4 8h13l-3-3M20 16H7l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const XICO='<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>';
const root=document.documentElement,GREEN='#1fa463',RED='#d93025';
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(p,q)=>Math.hypot(p.x-q.x,p.y-q.y);
let boardScale=1, resultMode='success';
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._);t._=setTimeout(()=>t.classList.remove('show'),2400);}
const TH=()=>getComputedStyle(root).getPropertyValue('--theme').trim()||'#f7a8c5';

/* theme */
function lum(hex){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16)/255,g=parseInt(c.substr(2,2),16)/255,b=parseInt(c.substr(4,2),16)/255;const f=v=>v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4);return .2126*f(r)+.7152*f(g)+.0722*f(b);}
function setTheme(hex){
  root.style.setProperty('--theme',hex);
  root.style.setProperty('--theme-text',lum(hex)>.62?'#212530':'#ffffff');
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  root.style.setProperty('--ring',`rgba(${r},${g},${b},.25)`);
  root.style.setProperty('--tint',`rgba(${r},${g},${b},.16)`);
  root.style.setProperty('--tint-strong',`rgba(${r},${g},${b},.26)`);
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('on',s.dataset.c.toLowerCase()===hex.toLowerCase()));
}
$('swatches').addEventListener('click',e=>{const s=e.target.closest('.swatch');if(!s)return;$('colorInput').value=s.dataset.c;setTheme(s.dataset.c);});
$('colorInput').addEventListener('input',e=>setTheme(e.target.value));

$('inName').addEventListener('input',e=>$('cardName').textContent=e.target.value||'키워드');

/* result seg */
$('resultSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;resultMode=b.dataset.r;[...$('resultSeg').children].forEach(x=>x.classList.toggle('on',x===b));});

/* pan/zoom */
function attachPanZoom(vp,photo,state,onTap){
  let pdown=false,moved=false,sx,sy,ox,oy;const pts=new Map();let pinch=null;
  const apply=()=>{photo.style.transform=`translate(${state.x}px,${state.y}px) scale(${state.scale})`;};
  state.apply=apply;
  vp.addEventListener('pointerdown',e=>{
    if(e.target.closest('.tools'))return;
    vp.setPointerCapture(e.pointerId);pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){pdown=true;moved=false;sx=e.clientX;sy=e.clientY;ox=state.x;oy=state.y;}
    else if(pts.size===2&&state.img){const a=[...pts.values()];pinch={d:dist(a[0],a[1]),s:state.scale,x:state.x,y:state.y,mx:(a[0].x+a[1].x)/2,my:(a[0].y+a[1].y)/2};pdown=false;moved=true;}
  });
  vp.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId))return;pts.set(e.pointerId,{x:e.clientX,y:e.clientY});const s=boardScale||1;
    if(pts.size>=2&&pinch&&state.img){const a=[...pts.values()];const d=dist(a[0],a[1]);state.scale=clamp(pinch.s*(d/pinch.d),.3,8);const mx=(a[0].x+a[1].x)/2,my=(a[0].y+a[1].y)/2;state.x=pinch.x+(mx-pinch.mx)/s;state.y=pinch.y+(my-pinch.my)/s;apply();moved=true;return;}
    if(pdown&&state.img){const dx=(e.clientX-sx)/s,dy=(e.clientY-sy)/s;if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>3)moved=true;state.x=ox+dx;state.y=oy+dy;apply();}
  });
  const up=e=>{if(pts.has(e.pointerId))pts.delete(e.pointerId);if(pts.size<2)pinch=null;if(pts.size===0){if(pdown&&!moved)onTap();pdown=false;}};
  vp.addEventListener('pointerup',up);vp.addEventListener('pointercancel',up);
  vp.addEventListener('wheel',e=>{if(!state.img)return;e.preventDefault();const s=boardScale||1;const r=vp.getBoundingClientRect();const mx=(e.clientX-r.left-r.width/2)/s,my=(e.clientY-r.top-r.height/2)/s;const old=state.scale;const ns=clamp(old*(e.deltaY<0?1.12:1/1.12),.3,8);state.x=mx-(mx-state.x)*(ns/old);state.y=my-(my-state.y)*(ns/old);state.scale=ns;apply();},{passive:false});
}
function readImg(file,cb){const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file);}
function loadInto(state,photo,el,d){const im=new Image();im.onload=()=>{state.img=im;fit();};im.src=d;photo.style.backgroundImage='url("'+d+'")';state.scale=1;state.x=0;state.y=0;state.apply();el.classList.add('has','filled');}

/* avatar */
const avatarState={img:null,scale:1,x:0,y:0,apply(){}};
attachPanZoom($('cardAvatar'),$('cardAvatar').querySelector('.aphoto'),avatarState,()=>$('mainFile').click());
$('mainFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;readImg(f,d=>{loadInto(avatarState,$('cardAvatar').querySelector('.aphoto'),$('cardAvatar'),d);$('avPrev').innerHTML='<img src="'+d+'">';});});

/* grid */
const grid=$('grid'),cells=[];
for(let i=0;i<9;i++){
  const cell=document.createElement('div');cell.className='cell';
  cell.innerHTML='<div class="photo"></div><div class="ph">＋</div><div class="frame"></div><div class="check">'+CHECK+'</div>'+
    '<div class="tools"><button class="swap" title="변경">'+SWAP+'</button><button class="del" title="삭제">'+XICO+'</button></div>'+
    '<input type="file" accept="image/*" hidden>';
  const input=cell.querySelector('input'),photo=cell.querySelector('.photo');
  const state={img:null,scale:1,x:0,y:0,apply(){}};
  const place=d=>{loadInto(state,photo,cell,d);cell.classList.add('sel');};
  attachPanZoom(cell,photo,state,()=>{if(cell.classList.contains('filled'))cell.classList.toggle('sel');else input.click();});
  input.addEventListener('change',()=>{const f=input.files[0];if(f)readImg(f,place);});
  cell.querySelector('.swap').addEventListener('click',e=>{e.stopPropagation();input.click();});
  cell.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();photo.style.backgroundImage='';state.img=null;state.scale=1;state.x=0;state.y=0;state.apply();cell.classList.remove('filled','sel');input.value='';fit();});
  cell.addEventListener('dragover',e=>e.preventDefault());
  cell.addEventListener('drop',e=>{e.preventDefault();const f=[...e.dataTransfer.files].find(x=>x.type.startsWith('image/'));if(f)readImg(f,place);});
  grid.appendChild(cell);cells.push({cell,state});
}

/* bulk + select all */
$('bulkBtn').addEventListener('click',()=>$('bulkFile').click());
$('bulkFile').addEventListener('change',e=>{const files=[...e.target.files];let fi=0;for(const{cell,state}of cells){if(fi>=files.length)break;if(!cell.classList.contains('filled'))readImg(files[fi++],d=>{loadInto(state,cell.querySelector('.photo'),cell,d);cell.classList.add('sel');});}e.target.value='';});
$('allBtn').addEventListener('click',()=>{const fl=cells.filter(c=>c.cell.classList.contains('filled'));if(!fl.length){toast('먼저 이미지를 넣어 주세요.');return;}const off=fl.some(c=>!c.cell.classList.contains('sel'));fl.forEach(c=>c.cell.classList.toggle('sel',off));});

/* footer toggle */
const card=$('card');
$('footSwitch').addEventListener('click',function(){this.classList.toggle('on');card.classList.toggle('showfoot',this.classList.contains('on'));fit();});
$('resetBtn').addEventListener('click',()=>{if(confirm('모든 내용을 초기화할까요?'))location.reload();});

/* responsive scaler */
const stage=$('stage'),scaler=$('scaler'),cardwrap=$('cardwrap');
function fit(){const avail=stage.clientWidth;boardScale=Math.min(1,avail/380);scaler.style.transform='scale('+boardScale+')';scaler.style.height=(cardwrap.offsetHeight*boardScale)+'px';}
new ResizeObserver(fit).observe(stage);
new ResizeObserver(fit).observe(cardwrap);
window.addEventListener('resize',fit);

/* ---------- drawing ---------- */
function roundRect(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawPhoto(ctx,R,st,S,radius){
  const x=R.x*S,y=R.y*S,w=R.w*S,h=R.h*S;ctx.save();roundRect(ctx,x,y,w,h,(radius||0)*S);ctx.clip();
  const im=st.img,iw=im.naturalWidth,ih=im.naturalHeight,cov=Math.max(w/iw,h/ih);
  const dw=iw*cov*st.scale,dh=ih*cov*st.scale,cx=x+w/2+st.x*S,cy=y+h/2+st.y*S;
  ctx.drawImage(im,cx-dw/2,cy-dh/2,dw,dh);ctx.restore();
}
function drawCheck(ctx,x,y,size,color){const r=size/2,cx=x+r,cy=y+r;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.arc(cx,cy,r-size*.085,0,7);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=size*.13;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(cx-r*.42,cy+r*.02);ctx.lineTo(cx-r*.08,cy+r*.38);ctx.lineTo(cx+r*.46,cy-r*.34);ctx.stroke();}
function drawSelection(ctx,R,S,color){const x=R.x*S,y=R.y*S,w=R.w*S,h=R.h*S,lw=2.6*S;ctx.strokeStyle=color;ctx.lineWidth=lw;roundRect(ctx,x+lw/2,y+lw/2,w-lw,h-lw,9*S);ctx.stroke();drawCheck(ctx,x+6*S,y+6*S,24*S,color);}
function cover(ctx,x,y,w){const p=w*.22;ctx.fillStyle='#fff';ctx.fillRect(x-p,y-p,w+2*p,w+2*p);}
function drawSpinner(ctx,cx,cy,radius,lineW,color,start){ctx.strokeStyle=color;ctx.lineWidth=lineW;ctx.lineCap='round';ctx.beginPath();ctx.arc(cx,cy,radius,start,start+Math.PI*1.45);ctx.stroke();}
function drawGreen(ctx,x,y,w,scale){const s=w*scale,cx=x+w/2,cy=y+w/2,r=s/2;ctx.strokeStyle=GREEN;ctx.lineWidth=s*.17;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(cx-r*.55,cy+r*.06);ctx.lineTo(cx-r*.12,cy+r*.5);ctx.lineTo(cx+r*.62,cy-r*.46);ctx.stroke();}
function drawRedX(ctx,x,y,w,scale){const s=w*scale,cx=x+w/2,cy=y+w/2,r=s/2*.62;ctx.strokeStyle=RED;ctx.lineWidth=s*.16;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx-r,cy-r);ctx.lineTo(cx+r,cy+r);ctx.moveTo(cx+r,cy-r);ctx.lineTo(cx-r,cy+r);ctx.stroke();}

function geometry(){
  const capR=$('card').getBoundingClientRect();const filled=[],sel=[];
  cells.forEach(c=>{if(c.state.img){const r=c.cell.getBoundingClientRect();const R={x:r.left-capR.left,y:r.top-capR.top,w:r.width,h:r.height};filled.push({R,st:c.state});if(c.cell.classList.contains('sel'))sel.push({R});}});
  let avatar=null;if(avatarState.img){const r=$('cardAvatar').getBoundingClientRect();avatar={R:{x:r.left-capR.left,y:r.top-capR.top,w:r.width,h:r.height},st:avatarState,radius:7};}
  return{filled,sel,avatar};
}
async function fontsReady(){try{await Promise.race([document.fonts.ready,new Promise(r=>setTimeout(r,1500))]);}catch(e){}}
async function decodeAll(){const a=[];cells.forEach(c=>c.state.img&&a.push(c.state.img));avatarState.img&&a.push(avatarState.img);await Promise.all(a.map(im=>im.decode?im.decode().catch(()=>{}):0));}
async function renderBase(S){
  const prevT=scaler.style.transform,prevTr=scaler.style.transition;
  scaler.style.transition='none';scaler.style.transform='none';
  const card=$('card');const geo=geometry();card.classList.add('capturing');let base;
  try{base=await html2canvas(card,{scale:S,backgroundColor:'#ffffff',useCORS:true,imageTimeout:0,logging:false});}
  finally{card.classList.remove('capturing');scaler.style.transform=prevT;scaler.style.transition=prevTr;}
  return{base,geo};
}
function buildFilled(base,geo,S){
  const cv=document.createElement('canvas');cv.width=base.width;cv.height=base.height;const ctx=cv.getContext('2d');
  ctx.drawImage(base,0,0);
  geo.filled.forEach(f=>drawPhoto(ctx,f.R,f.st,S,0));
  if(geo.avatar)drawPhoto(ctx,geo.avatar.R,geo.avatar.st,S,geo.avatar.radius);
  return cv;
}
function fname(ext){const n=($('cardName').textContent||'recaptcha').trim().replace(/\s+/g,'_');return 'recaptcha_'+n+'.'+ext;}

/* PNG */
$('pngBtn').addEventListener('click',async()=>{
  if(typeof html2canvas==='undefined'){toast('미리보기에선 막혀요 — 파일을 직접 열어 주세요.');return;}
  const busy=$('busy');busy.classList.add('show');$('busyTxt').textContent='이미지 만드는 중…';
  await fontsReady();await decodeAll();
  try{
    const S=4;const{base,geo}=await renderBase(S);const out=buildFilled(base,geo,S);const ctx=out.getContext('2d');
    const color=TH();geo.sel.forEach(s=>drawSelection(ctx,s.R,S,color));
    const a=document.createElement('a');a.download=fname('png');a.href=out.toDataURL('image/png');a.click();toast('PNG 저장 완료!');
  }catch(err){console.error(err);toast('저장 실패 — 파일을 직접 열어 주세요.');}
  finally{busy.classList.remove('show');}
});

/* GIF */
async function renderRobot(S){
  const ww=$('robotWidget').getBoundingClientRect(),rb=$('rbox2').getBoundingClientRect();
  const rel={x:rb.left-ww.left,y:rb.top-ww.top,w:rb.width};
  const c=await html2canvas($('robotWidget'),{scale:S,backgroundColor:null,useCORS:true,logging:false});
  return{c,rel};
}
$('gifBtn').addEventListener('click',async()=>{
  if(typeof html2canvas==='undefined'||typeof GIF==='undefined'){toast('미리보기에선 막혀요 — 파일을 직접 열어 주세요.');return;}
  const busy=$('busy'),busyTxt=$('busyTxt');busy.classList.add('show');busyTxt.textContent='GIF 만드는 중…';
  await fontsReady();await decodeAll();
  try{
    const S=2,color=TH();
    const{base,geo}=await renderBase(S);const filled=buildFilled(base,geo,S);
    const robot=await renderRobot(S);
    const W=base.width,H=base.height,N=geo.sel.length;
    const ow=robot.c.width,oh=robot.c.height,ox=(W-ow)/2,oy=(H-oh)/2;
    const wResp=await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
    const wUrl=URL.createObjectURL(new Blob([await wResp.text()],{type:'application/javascript'}));
    const gif=new GIF({workers:2,quality:8,width:W,height:H,workerScript:wUrl,repeat:0,background:'#fff'});
    function selFrame(n,delay){const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');ctx.drawImage(filled,0,0);for(let i=0;i<n;i++)drawSelection(ctx,geo.sel[i].R,S,color);gif.addFrame(ctx,{copy:true,delay});}
    function robotFrame(o,delay){
      const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');ctx.drawImage(filled,0,0);
      geo.sel.forEach(s=>drawSelection(ctx,s.R,S,color));
      ctx.save();ctx.globalAlpha=o.alpha;ctx.shadowColor='rgba(0,0,0,.28)';ctx.shadowBlur=22*S;ctx.shadowOffsetY=8*S;
      const w=ow*o.scale,h=oh*o.scale,dx=ox+(ow-w)/2,dy=oy+(oh-h)/2;ctx.drawImage(robot.c,dx,dy,w,h);ctx.restore();
      if(o.spin!=null||o.result){const bx=ox+robot.rel.x*S,by=oy+robot.rel.y*S,bw=robot.rel.w*S;cover(ctx,bx,by,bw);
        if(o.spin!=null)drawSpinner(ctx,bx+bw/2,by+bw/2,bw*.34,bw*.13,color,o.spin);
        else if(resultMode==='success')drawGreen(ctx,bx,by,bw,o.rscale);else drawRedX(ctx,bx,by,bw,o.rscale);}
      gif.addFrame(ctx,{copy:true,delay});
    }
    selFrame(0,380);for(let k=1;k<=N;k++)selFrame(k,130);selFrame(N,320);
    robotFrame({alpha:0,scale:.82},40);robotFrame({alpha:.65,scale:.93},55);robotFrame({alpha:1,scale:1},260);
    for(let i=0;i<11;i++)robotFrame({alpha:1,scale:1,spin:i*0.62},70);
    robotFrame({alpha:1,scale:1,result:true,rscale:.5},90);
    robotFrame({alpha:1,scale:1,result:true,rscale:1},2000);
    gif.on('progress',p=>busyTxt.textContent='GIF 만드는 중… '+Math.round(p*100)+'%');
    gif.on('finished',blob=>{const a=document.createElement('a');a.download=fname('gif');a.href=URL.createObjectURL(blob);a.click();busy.classList.remove('show');toast('GIF 저장 완료!');});
    gif.render();
  }catch(err){console.error(err);busy.classList.remove('show');toast('GIF 저장 실패 — 파일을 직접 열어 주세요.');}
});

const st=document.createElement('style');
st.textContent='#card.capturing .photo,#card.capturing .aphoto,#card.capturing .frame,#card.capturing .check,#card.capturing .ph{visibility:hidden}#card.capturing .tools{display:none!important}';
document.head.appendChild(st);

setTheme('#f7a8c5');
requestAnimationFrame(fit);
</script>
